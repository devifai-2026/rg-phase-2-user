name: Build testing APK

# On every push to main, build a release APK (signed with the debug key so it
# installs on any physical device — NOT a Play Store build) pointed at the prod
# backend, and publish it to a GitHub Release so it has a stable download URL.
#
# Download: the workflow prints a direct link in its summary, and the APK is
# always available at the "testing-latest" release:
#   https://github.com/devifai-2026/rg-phase-2-user/releases/tag/testing-latest

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write  # needed to create/update the Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Build release APK (prod backend)
        run: |
          flutter build apk --release \
            --dart-define=RG_API_BASE=https://34-93-133-182.sslip.io
          # Stamp the filename with the short SHA so testers know what they have.
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          mkdir -p out
          cp build/app/outputs/flutter-apk/app-release.apk "out/rg-user-${SHA}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "out/rg-user-latest.apk"
          echo "SHA=$SHA" >> "$GITHUB_ENV"

      - name: Publish to 'testing-latest' release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: testing-latest
          name: Testing APK (latest)
          body: |
            Latest user-app testing APK — built from `main` @ ${{ github.sha }}.
            Backend: https://34-93-133-182.sslip.io
            Install on any Android device (enable "install from unknown sources").
          files: |
            out/rg-user-${{ env.SHA }}.apk
            out/rg-user-latest.apk
          fail_on_unmatched_files: true

      - name: Print download URL
        run: |
          echo "### 📱 User APK ready" >> "$GITHUB_STEP_SUMMARY"
          echo "Download: https://github.com/${{ github.repository }}/releases/download/testing-latest/rg-user-latest.apk" >> "$GITHUB_STEP_SUMMARY"
          echo "(versioned: rg-user-${{ env.SHA }}.apk)" >> "$GITHUB_STEP_SUMMARY"
