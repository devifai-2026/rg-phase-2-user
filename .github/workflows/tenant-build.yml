name: Tenant build (user app)

# Dispatched by the ApnaAstro backend (buildDispatchService) when the owner
# requests a build in the console. Builds the user app stamped for one tenant
# (applicationId, brand, API base, TENANT + deep-link scheme), uploads the
# signed AAB/APK to GCS, and POSTs the result back to the backend so the
# BuildJob flips to succeeded/failed with a download link.
#
# Required repo secrets:
#   GCS_SA_KEY            — GCP service-account JSON with Storage Object Admin on the bucket
#   GCS_BUCKET           — target bucket (e.g. rudraganga)
#   BUILD_CALLBACK_SECRET — shared secret matching backend BUILD_CALLBACK_SECRET
# Optional per-tenant signing (else debug-signed, NOT Play-ready):
#   ANDROID_KEYSTORE_B64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD

on:
  workflow_dispatch:
    inputs:
      job_id:          { description: BuildJob id, required: true }
      tenant:          { description: tenant slug, required: true }
      artifact:        { description: aab or apk, required: true, default: aab }
      application_id:  { description: Android applicationId, required: true }
      app_label:       { description: home-screen + notification app name, required: false, default: '' }
      version_name:    { description: version name, required: true, default: '1.0.0' }
      version_code:    { description: version code (int), required: true, default: '1' }
      api_base:        { description: backend API base URL, required: true }
      callback_base:   { description: backend base for the result callback, required: true }

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Job-level so step-level `if:` can read these (the `secrets` context is
      # NOT allowed in a step `if:` expression).
      FIREBASE_SA: ${{ secrets.FIREBASE_SA }}
      ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.44.4', channel: stable, cache: true }

      - name: Pub get
        run: flutter pub get

      # Fetch the google-services.json that matches THIS tenant's applicationId
      # from the shared Firebase project via the Management API. The backend
      # registers the app at tenant-create time; here we pull its config so the
      # `processReleaseGoogleServices` Gradle task finds a matching client.
      # Falls back to the committed file when FIREBASE_SA is not set.
      - name: Fetch tenant google-services.json
        if: ${{ env.FIREBASE_SA != '' }}
        env:
          APPLICATION_ID: ${{ inputs.application_id }}
        run: |
          node - <<'EOF'
          const crypto = require('crypto'), https = require('https');
          const k = JSON.parse(process.env.FIREBASE_SA);
          const pkg = process.env.APPLICATION_ID;
          const now = Math.floor(Date.now() / 1000);
          const b64 = (o) => Buffer.from(JSON.stringify(o)).toString('base64url');
          const jwt = () => {
            const h = b64({ alg: 'RS256', typ: 'JWT' });
            const c = b64({ iss: k.client_email, scope: 'https://www.googleapis.com/auth/cloud-platform', aud: 'https://oauth2.googleapis.com/token', iat: now, exp: now + 3600 });
            const sig = crypto.createSign('RSA-SHA256').update(h + '.' + c).sign(k.private_key, 'base64url');
            return `${h}.${c}.${sig}`;
          };
          const req = (opts, body) => new Promise((res, rej) => {
            const r = https.request(opts, (x) => { let d = ''; x.on('data', (b) => d += b); x.on('end', () => res({ status: x.statusCode, body: d })); });
            r.on('error', rej); if (body) r.write(body); r.end();
          });
          (async () => {
            const tok = await req({ method: 'POST', host: 'oauth2.googleapis.com', path: '/token', headers: { 'content-type': 'application/x-www-form-urlencoded' } },
              'grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=' + jwt());
            const access = JSON.parse(tok.body).access_token;
            if (!access) { console.error('no access token'); process.exit(1); }
            const auth = { host: 'firebase.googleapis.com', headers: { Authorization: 'Bearer ' + access } };
            const proj = k.project_id;
            let apps = [], pageToken = '';
            do {
              const p = await req({ ...auth, method: 'GET', path: `/v1beta1/projects/${proj}/androidApps?pageSize=100` + (pageToken ? `&pageToken=${pageToken}` : '') });
              const j = JSON.parse(p.body); apps = apps.concat(j.apps || []); pageToken = j.nextPageToken || '';
            } while (pageToken);
            const app = apps.find((a) => a.packageName === pkg);
            if (!app) { console.error(`applicationId ${pkg} is NOT registered in Firebase project ${proj}. Register it (backend does this at tenant-create) before building.`); process.exit(1); }
            const cfg = await req({ ...auth, method: 'GET', path: `/v1beta1/${app.name}/config` });
            const contents = Buffer.from(JSON.parse(cfg.body).configFileContents, 'base64').toString('utf8');
            require('fs').writeFileSync('android/app/google-services.json', contents);
            console.log(`Wrote google-services.json for ${pkg} (project ${proj}, ${contents.length} bytes)`);
          })().catch((e) => { console.error(e); process.exit(1); });
          EOF

      # Decode the platform release keystore + write a props file so Gradle signs
      # the release with it (else the build falls back to debug signing → NOT
      # Play-uploadable). Same keystore for every tenant; Play App Signing then
      # re-signs per app on Google's side.
      - name: Prepare release signing
        if: ${{ env.ANDROID_KEYSTORE_B64 != '' }}
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.jks"
          cat > "$RUNNER_TEMP/keystore.properties" <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF
          echo "SIGN_KEYSTORE=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
          echo "SIGN_PROPS=$RUNNER_TEMP/keystore.properties" >> "$GITHUB_ENV"

      - name: Build ${{ inputs.artifact }} for tenant ${{ inputs.tenant }}
        id: build
        run: |
          set -e
          DEEPLINK="${{ inputs.tenant }}"   # per-tenant deep-link scheme = slug
          APP_LABEL="${{ inputs.app_label }}"
          [ -z "$APP_LABEL" ] && APP_LABEL="${{ inputs.tenant }}"   # fall back to slug
          COMMON=( --release \
            --build-name="${{ inputs.version_name }}" \
            --build-number="${{ inputs.version_code }}" \
            --dart-define=RG_API_BASE="${{ inputs.api_base }}" \
            --dart-define=TENANT="${{ inputs.tenant }}" \
            --dart-define=DEEPLINK_SCHEME="$DEEPLINK" \
            -Ptenant.applicationId="${{ inputs.application_id }}" \
            -Ptenant.appLabel="$APP_LABEL" \
            -Ptenant.deepLinkScheme="$DEEPLINK" )
          # Attach the release keystore when it was prepared above.
          if [ -n "$SIGN_KEYSTORE" ]; then
            COMMON+=( -Ptenant.keystore="$SIGN_KEYSTORE" -Ptenant.keystoreProps="$SIGN_PROPS" )
            echo "Signing with platform release keystore."
          else
            echo "::warning::No keystore secret — build will be DEBUG-signed (not Play-ready)."
          fi
          if [ "${{ inputs.artifact }}" = "apk" ]; then
            flutter build apk "${COMMON[@]}"
            echo "path=build/app/outputs/flutter-apk/app-release.apk" >> "$GITHUB_OUTPUT"
          else
            flutter build appbundle "${COMMON[@]}"
            echo "path=build/app/outputs/bundle/release/app-release.aab" >> "$GITHUB_OUTPUT"
          fi

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with: { credentials_json: '${{ secrets.GCS_SA_KEY }}' }
      - uses: google-github-actions/setup-gcloud@v2

      - name: Upload to GCS
        id: up
        run: |
          OBJ="tenants/${{ inputs.tenant }}/builds/user-${{ inputs.version_name }}-${{ github.run_number }}.${{ inputs.artifact }}"
          gsutil cp "${{ steps.build.outputs.path }}" "gs://${{ secrets.GCS_BUCKET }}/$OBJ"
          echo "url=https://storage.googleapis.com/${{ secrets.GCS_BUCKET }}/$OBJ" >> "$GITHUB_OUTPUT"

      - name: Callback — success
        if: success()
        run: |
          curl -fsS -X POST "${{ inputs.callback_base }}/platform/builds/${{ inputs.job_id }}/callback" \
            -H "content-type: application/json" \
            -H "x-build-secret: ${{ secrets.BUILD_CALLBACK_SECRET }}" \
            --data "{\"status\":\"succeeded\",\"artifactUrl\":\"${{ steps.up.outputs.url }}\"}"

      - name: Callback — failure
        if: failure()
        run: |
          curl -fsS -X POST "${{ inputs.callback_base }}/platform/builds/${{ inputs.job_id }}/callback" \
            -H "content-type: application/json" \
            -H "x-build-secret: ${{ secrets.BUILD_CALLBACK_SECRET }}" \
            --data "{\"status\":\"failed\",\"error\":\"build failed — see GitHub Actions logs\"}" || true
